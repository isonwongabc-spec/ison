<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000" />
      <stop offset="50%" style="stop-color:#DC143C" />
      <stop offset="100%" style="stop-color:#8B0000" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFA500" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0a"/>
  
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Iron Man helmet shape -->
  <ellipse cx="100" cy="100" rx="70" ry="75" fill="url(#metal)"/>
  
  <!-- Gold accents -->
  <path d="M 60 70 Q 100 50 140 70 L 135 85 Q 100 70 65 85 Z" fill="url(#gold)"/>
  <path d="M 50 100 Q 45 130 55 150 L 70 140 Q 60 120 65 100 Z" fill="url(#gold)"/>
  <path d="M 150 100 Q 155 130 145 150 L 130 140 Q 140 120 135 100 Z" fill="url(#gold)"/>
  
  <!-- Eyes (glowing blue) -->
  <ellipse cx="75" cy="95" rx="15" ry="8" fill="#00d4ff"/>
  <ellipse cx="125" cy="95" rx="15" ry="8" fill="#00d4ff"/>
  
  <!-- Eye glow effect -->
  <ellipse cx="75" cy="95" rx="20" ry="12" fill="url(#glow)" opacity="0.5"/>
  <ellipse cx="125" cy="95" rx="20" ry="12" fill="url(#glow)" opacity="0.5"/>
  
  <!-- Arc reactor (chest) -->
  <circle cx="100" cy="135" r="12" fill="#00d4ff"/>
  <circle cx="100" cy="135" r="8" fill="#ffffff"/>
  <circle cx="100" cy="135" r="20" fill="url(#glow)" opacity="0.4"/>
  
  <!-- Tech lines -->
  <line x1="30" y1="100" x2="50" y2="100" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="150" y1="100" x2="170" y2="100" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="100" y1="30" x2="100" y2="45" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  <line x1="100" y1="155" x2="100" y2="170" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
  
  <!-- Corner accents -->
  <path d="M 20 20 L 40 20 L 40 25 L 25 25 L 25 40 L 20 40 Z" fill="#00d4ff" opacity="0.7"/>
  <path d="M 180 20 L 160 20 L 160 25 L 175 25 L 175 40 L 180 40 Z" fill="#00d4ff" opacity="0.7"/>
  <path d="M 20 180 L 40 180 L 40 175 L 25 175 L 25 160 L 20 160 Z" fill="#00d4ff" opacity="0.7"/>
  <path d="M 180 180 L 160 180 L 160 175 L 175 175 L 175 160 L 180 160 Z" fill="#00d4ff" opacity="0.7"/>
</svg>